name: Docker Compose CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout your repository
      - name: Checkout repo
        uses: actions/checkout@v3

      # 2️⃣ Set up Docker
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Set up Docker Compose
        uses: docker/setup-qemu-action@v2

      # 3️⃣ Build all services in docker-compose
      - name: Build Docker Compose services
        run: docker-compose -f docker-compose.yml build

      # 4️⃣ Optionally, run the services for smoke test
      - name: Run Docker Compose services (smoke test)
        run: |
          docker-compose -f docker-compose.yml up -d
          docker-compose ps
          # stop the services afterwards
          docker-compose down

      # 5️⃣ Optional: push images to GHCR (GitHub Container Registry)
      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Push Images
        run: |
          docker-compose -f docker-compose.yml build
          # Example: tag & push your main service
          docker tag cars_ci_cd_web:latest ghcr.io/${{ github.repository }}/cars_ci_cd_web:latest
          docker push ghcr.io/${{ github.repository }}/cars_ci_cd_web:latest
